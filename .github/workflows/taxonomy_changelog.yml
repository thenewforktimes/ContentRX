name: Taxonomy changelog gate

# DISABLED 2026-04-29 — operates on private substrate.
#
# Per ADR 2026-04-25 and the 2026-04-29 substrate-hosting move, the
# substrate JSON files and the refinement log are gitignored. PRs in
# the public repo cannot edit those paths, so this gate has no public
# trigger. The equivalent enforcement lives in the private substrate
# repo's CI.
#
# `moments.py` is the one taxonomy-touching file still in the public
# tree. Keeping the trigger on it lets a future re-enable cover that
# case; for now `if: false` no-ops the job.

on:
  pull_request:
    paths:
      - "src/content_checker/moments.py"

concurrency:
  group: taxonomy-changelog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: taxonomy changelog entry
    runs-on: ubuntu-latest
    if: false  # disabled — substrate is private (see header)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history so the check can walk every commit from base..head.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Enforce changelog entry
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/check_taxonomy_changelog.py
