name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest:
    name: vitest (web app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch substrate
        # vitest exercises code paths that load the standards library
        # at import time. The substrate lives in a private repo per
        # ADR 2026-04-25; the same scripts/fetch-substrate.sh that
        # Vercel runs in `prebuild` (package.json) also runs here.
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Run vitest
        run: npm test
