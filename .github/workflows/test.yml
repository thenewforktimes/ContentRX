name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest:
    name: vitest (web app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch substrate
        # vitest exercises code paths that load the standards library
        # at import time. The substrate lives in a private repo per
        # ADR 2026-04-25; the same scripts/fetch-substrate.sh that
        # Vercel runs in `prebuild` (package.json) also runs here.
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Run vitest
        run: npm test
