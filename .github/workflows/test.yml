name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest:
    name: vitest (web app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
