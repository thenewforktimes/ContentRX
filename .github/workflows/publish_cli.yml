name: Publish contentrx-cli

# Builds and publishes the CLI client package to PyPI on every tag
# matching cli-v*. Use `cli-v0.4.0`, `cli-v0.5.0`, etc., to keep the
# CLI tag-space distinct from the MCP server's `mcp-v*` tags.
#
# PyPI auth: Trusted Publishing (no API token in this repo). Configure
# a Trusted Publisher on https://pypi.org/manage/project/contentrx-cli/
# pointing at this workflow file + the `publish` environment.

on:
  push:
    tags:
      - "cli-v*"

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Verify version matches tag
        # Trusted Publishing rejects mismatched versions, but failing
        # early here gives a much clearer error message in the CI log.
        run: |
          PKG_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('cli-client/pyproject.toml').read_text())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build distributions
        run: |
          cd cli-client
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: cli-client/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: publish
      url: https://pypi.org/p/contentrx-cli
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      # IF THIS STEP FAILS WITH `invalid-publisher`:
      #
      # The OIDC token issued by GitHub was valid, but PyPI does not have
      # a Trusted Publisher configured that matches the claims this
      # workflow sends. Visit
      #   https://pypi.org/manage/project/contentrx-cli/settings/publishing/
      # and confirm a GitHub Trusted Publisher exists with these EXACT
      # values:
      #   Owner:            thenewforktimes
      #   Repository name:  contentRX
      #   Workflow name:    publish_cli.yml
      #   Environment name: publish      <-- NOT "release" (PyPI's
      #                                       placeholder text). Must
      #                                       match `environment.name`
      #                                       above.
      #
      # Once corrected, re-run this workflow with
      #   gh run rerun <run-id> --failed --repo thenewforktimes/contentRX
      # No re-tag is needed.
      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/
