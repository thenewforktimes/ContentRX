name: PUBLIC_TAXONOMY=true smoke

# Runs the full Python and TypeScript test suites with the
# `PUBLIC_TAXONOMY` feature flag flipped to `true`.
#
# Why this exists: the flag's default is `false`, so day-to-day CI
# never exercises the public-taxonomy code paths. The
# 2026-04-25 private-taxonomy pivot ADR commits to keeping those
# paths in the codebase as reversibility insurance — but reversibility
# insurance only works if it stays compilable and green. This workflow
# is the smoke test that prevents the flag from silently rotting into
# dead code.
#
# Today the flag has no gated branches; the suites pass identically
# under both modes. As code paths get gated by `PUBLIC_TAXONOMY` in
# later sessions, this job becomes a real reversibility check —
# regressions in the public-taxonomy branch will fail this workflow
# specifically while the default-mode CI stays green.
#
# See `decisions/2026-04-25-private-taxonomy-pivot.md`,
# `src/content_checker/config.py`, and `src/lib/feature-flags.ts`.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: public-taxonomy-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (PUBLIC_TAXONOMY=true)
    runs-on: ubuntu-latest
    env:
      PUBLIC_TAXONOMY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install engine
        run: pip install -e ".[dev]"

      - name: Fetch substrate
        # The engine loads the standards library at import time. Substrate
        # lives in a private repo per ADR 2026-04-25; same script Vercel
        # runs in `prebuild`.
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Run pytest with PUBLIC_TAXONOMY=true
        run: python3 -m pytest tests/ -q

  vitest:
    name: vitest (PUBLIC_TAXONOMY=true)
    runs-on: ubuntu-latest
    env:
      PUBLIC_TAXONOMY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch substrate
        env:
          SUBSTRATE_TOKEN: ${{ secrets.SUBSTRATE_TOKEN }}
        run: scripts/fetch-substrate.sh

      - name: Run vitest with PUBLIC_TAXONOMY=true
        run: npm test
